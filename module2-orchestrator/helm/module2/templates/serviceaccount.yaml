{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "module2.serviceAccountName" . }}
  namespace: {{ include "module2.namespace" . }}
  labels:
    {{- include "module2.labels" . }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
{{- end }}
