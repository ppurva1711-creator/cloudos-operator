{{- if .Values.gateway.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "module2.fullname" . }}-gateway
  namespace: {{ include "module2.namespace" . }}
  labels:
    {{- include "module2.labels" . }}
    app: api-gateway
spec:
  type: {{ .Values.gateway.service.type }}
  ports:
  - port: {{ .Values.gateway.service.port }}
    targetPort: http
    protocol: TCP
    name: http
  selector:
    {{- include "module2.selectorLabels" . }}
    app: api-gateway
{{- end }}
