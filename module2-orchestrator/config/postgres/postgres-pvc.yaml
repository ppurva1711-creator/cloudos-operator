apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: module2-system
  labels:
    app: postgres
    component: storage
    managed-by: cloudtask-operator
  annotations:
    description: "PostgreSQL data storage for CloudTask Orchestrator"
    backup: "true"
    retention-days: "30"
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 5Gi
