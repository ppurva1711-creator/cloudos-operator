apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: module2-system
  labels:
    app: postgres
    component: database
    managed-by: cloudtask-operator
type: Opaque
data:
  # All credentials are base64 encoded
  # DB Name: cloudtaskdb
  POSTGRES_DB: Y2xvdWR0YXNrZGI=
  # Username: cloudtask
  POSTGRES_USER: Y2xvdWR0YXNr
  # Password: CloudTaskPG2024!
  POSTGRES_PASSWORD: Q2xvdWRUYXNrUEcyMDI0IQ==
  # Connection string for Go clients
  # Format: user=cloudtask password=CloudTaskPG2024! dbname=cloudtaskdb sslmode=disable
  DATABASE_URL: dXNlcj1jbG91ZHRhc2sgcGFzc3dvcmQ9Q2xvdWRUYXNrUEcyMDI0ISBkYm5hbWU9Y2xvdWR0YXNrZGIgc3NsbW9kZT1kaXNhYmxl
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-backup-creds
  namespace: module2-system
  labels:
    app: postgres
    component: backup
    managed-by: cloudtask-operator
type: Opaque
stringData:
  # Backup credentials (not base64, stringData handles encoding)
  backup_username: "backup_user"
  backup_password: "BackupPG2024!"
