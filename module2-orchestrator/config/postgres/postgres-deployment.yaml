apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: module2-system
  labels:
    app: postgres
    component: config
    managed-by: cloudtask-operator
data:
  postgresql.conf: |
    # PostgreSQL Configuration for CloudTask Orchestrator
    # Performance tuning for Kubernetes environment
    
    # Memory Settings
    shared_buffers = 128MB
    effective_cache_size = 256MB
    maintenance_work_mem = 64MB
    work_mem = 16MB
    
    # Connection Settings
    max_connections = 100
    max_prepared_transactions = 50
    
    # Logging
    log_min_duration_statement = 1000
    log_connections = on
    log_disconnections = on
    log_statement = 'all'
    
    # Persistence
    wal_level = replica
    max_wal_senders = 3
    wal_keep_segments = 64
    
    # Checkpoint Settings
    checkpoint_completion_target = 0.9
    wal_buffers = 16MB
    
    # Listening
    listen_addresses = '*'
    ssl = off

  pg_hba.conf: |
    # PostgreSQL Client Authentication Configuration
    # TYPE  DATABASE        USER            ADDRESS                 METHOD
    local   all             all                                     trust
    host    all             all             127.0.0.1/32            md5
    host    all             all             ::1/128                 md5
    host    all             all             0.0.0.0/0               md5

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: module2-system
  labels:
    app: postgres
    component: database
    managed-by: cloudtask-operator
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
        component: database
        managed-by: cloudtask-operator
      annotations:
        description: "PostgreSQL database for CloudTask task history"
        backup: "true"
    spec:
      # Scheduling
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: NotIn
                    values:
                      - "true"
      
      # Security
      serviceAccountName: default
      securityContext:
        fsGroup: 999
        runAsNonRoot: true
        runAsUser: 999
      
      # Pod termination grace period
      terminationGracePeriodSeconds: 30
      
      containers:
      - name: postgres
        image: postgres:15-alpine
        imagePullPolicy: IfNotPresent
        
        # Ports
        ports:
        - name: postgresql
          containerPort: 5432
          protocol: TCP
        
        # Environment variables from secrets
        env:
        - name: POSTGRES_DB
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: POSTGRES_DB
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: POSTGRES_USER
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-credentials
              key: POSTGRES_PASSWORD
        - name: POSTGRES_INITDB_ARGS
          value: "-c shared_buffers=128MB -c effective_cache_size=256MB -c max_connections=100"
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        
        # Volume mounts
        volumeMounts:
        - name: postgres-data
          mountPath: /var/lib/postgresql/data
          subPath: pgdata
        - name: postgres-config
          mountPath: /etc/postgresql
          readOnly: true
        
        # Health checks
        livenessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U $POSTGRES_USER -d $POSTGRES_DB -h localhost
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        
        readinessProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U $POSTGRES_USER -d $POSTGRES_DB -h localhost
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 2
        
        startupProbe:
          exec:
            command:
            - /bin/sh
            - -c
            - pg_isready -U $POSTGRES_USER -d $POSTGRES_DB -h localhost
          initialDelaySeconds: 0
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 30  # 300 seconds max
        
        # Resource management
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
        
        # Lifecycle hooks
        lifecycle:
          preStop:
            exec:
              command:
              - /bin/sh
              - -c
              - pg_ctl stop -m fast || true
      
      # Volumes
      volumes:
      - name: postgres-data
        persistentVolumeClaim:
          claimName: postgres-data
      - name: postgres-config
        configMap:
          name: postgres-config
          defaultMode: 0644
