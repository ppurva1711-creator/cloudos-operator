apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cloudtask-operator-hpa
  namespace: orchestrator-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cloudtask-operator
  minReplicas: 1
  maxReplicas: 3
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 15
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 15
      - type: Pods
        value: 1
        periodSeconds: 15
      selectPolicy: Max
