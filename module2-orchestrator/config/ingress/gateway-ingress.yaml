apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api-gateway-ingress
  namespace: orchestrator-system
  annotations:
    # NGINX-specific annotations
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    
    # Rate limiting (per ingress, applied to all rules)
    nginx.ingress.kubernetes.io/limit-rps: "1000"
    nginx.ingress.kubernetes.io/limit-connections: "200"
    
    # Security headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
    
    # CORS support (if needed)
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://cloudtask.local"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"
    
    # Documentation
    description: "TLS ingress for CloudTask API Gateway"

spec:
  ingressClassName: nginx
  
  tls:
    - hosts:
        - cloudtask.local
        - "*.cloudtask.local"
      secretName: cloudtask-tls

  rules:
    - host: cloudtask.local
      http:
        paths:
          # Task API endpoints
          - path: /v1/tasks
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8080

          # Task scheduling endpoints
          - path: /v1/schedule
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8080

          # Health check endpoints
          - path: /healthz
            pathType: Exact
            backend:
              service:
                name: api-gateway
                port:
                  number: 8080

          - path: /readyz
            pathType: Exact
            backend:
              service:
                name: api-gateway
                port:
                  number: 8080

          # Metrics endpoints (internal)
          - path: /metrics
            pathType: Exact
            backend:
              service:
                name: api-gateway
                port:
                  number: 8080

          # Default catch-all for v1 API
          - path: /v1
            pathType: Prefix
            backend:
              service:
                name: api-gateway
                port:
                  number: 8080

---
# Service definition for reference (should already exist in your cluster)
# This is listed here for documentation purposes
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: orchestrator-system
  labels:
    app: api-gateway
    version: v1
spec:
  type: ClusterIP
  selector:
    app: api-gateway
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 8080
    - name: https
      protocol: TCP
      port: 8443
      targetPort: 8443
