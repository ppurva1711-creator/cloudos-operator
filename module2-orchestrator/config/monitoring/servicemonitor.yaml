apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: cloudtask-operator-metrics
  namespace: monitoring
  labels:
    app: cloudtask-operator
    release: kube-prometheus-stack
spec:
  # Select services in orchestrator-system namespace
  namespaceSelector:
    matchNames:
      - orchestrator-system
  
  # Select the operator service
  selector:
    matchLabels:
      app: cloudtask-operator
      component: metrics
  
  # Endpoints to scrape
  endpoints:
    - port: metrics
      interval: 15s
      scrapeTimeout: 10s
      path: /metrics
      scheme: http
      relabelings:
        # Add namespace label
        - sourceLabels: [__meta_kubernetes_namespace]
          targetLabel: namespace
        # Add pod name label
        - sourceLabels: [__meta_kubernetes_pod_name]
          targetLabel: pod
        # Add service name label
        - sourceLabels: [__meta_kubernetes_service_name]
          targetLabel: service

