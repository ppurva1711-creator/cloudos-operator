apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tenant-rolebinding
  namespace: ${TENANT_NAMESPACE}  # Replace with tenant namespace (e.g., tenant-a)
  labels:
    app: cloudtask
    component: tenant-rbac
    managed-by: cloudtask-operator
    tenant-id: "${TENANT_NAME}"  # Replace with tenant ID
  annotations:
    description: "RoleBinding linking tenant-role to tenant ServiceAccount in ${TENANT_NAMESPACE} namespace"
    created-by: "cloudtask-orchestrator"
    version: "v1.0.0"

roleRef:
  # Reference to the Role this RoleBinding applies
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tenant-role  # Must match Role metadata.name

subjects:
  # ServiceAccounts that get the permissions from the Role
  - kind: ServiceAccount
    name: tenant-${TENANT_NAME}  # ServiceAccount name (e.g., tenant-a)
    namespace: ${TENANT_NAMESPACE}  # ServiceAccount namespace (must match Role namespace)

---
# OPTIONAL: Additional RoleBindings for specific use cases
# Uncomment if you need to grant permissions to specific users or groups

