apiVersion: v1
kind: ServiceAccount
metadata:
  name: cloudtask-operator
  namespace: orchestrator-system

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cloudtask-operator
rules:
# CloudTask permissions
- apiGroups:
  - tasks.orchestrator.dev
  resources:
  - cloudtasks
  verbs:
  - create
  - delete
  - deletecollection
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - tasks.orchestrator.dev
  resources:
  - cloudtasks/status
  verbs:
  - get
  - patch
  - update
- apiGroups:
  - tasks.orchestrator.dev
  resources:
  - cloudtasks/finalizers
  verbs:
  - update

# Pod permissions
- apiGroups:
  - ""
  resources:
  - pods
  verbs:
  - create
  - delete
  - deletecollection
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - ""
  resources:
  - pods/status
  verbs:
  - get

# Event permissions
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch

# Leader election permissions
- apiGroups:
  - ""
  resources:
  - configmaps
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete
- apiGroups:
  - coordination.k8s.io
  resources:
  - leases
  verbs:
  - get
  - list
  - watch
  - create
  - update
  - patch
  - delete

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cloudtask-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cloudtask-operator
subjects:
- kind: ServiceAccount
  name: cloudtask-operator
  namespace: orchestrator-system
