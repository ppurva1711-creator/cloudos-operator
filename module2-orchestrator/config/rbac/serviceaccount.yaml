apiVersion: v1
kind: ServiceAccount
metadata:
  name: tenant-${TENANT_NAME}  # ServiceAccount name (e.g., tenant-a)
  namespace: ${TENANT_NAMESPACE}  # Namespace where this SA is created (e.g., tenant-a)
  labels:
    # Core identification
    app: cloudtask
    component: service-account
    managed-by: cloudtask-operator
    tenant-id: "${TENANT_NAME}"
    
    # Operational labels
    version: "v1.0.0"
    type: "tenant"
  annotations:
    # Documentation
    description: "ServiceAccount for CloudTask tenant ${TENANT_NAME} - used for authenticating task submissions and operator interactions"
    contact: "devops@company.com"  # Update with your contact
    created-by: "cloudtask-orchestrator"
    created-date: "2026-04-19"
    
    # Additional metadata
    "policy.cloudtask.orchestrator.dev/purpose": "task-execution"
    "security.cloudtask.orchestrator.dev/audit": "enabled"
    "observability.cloudtask.orchestrator.dev/metrics": "true"

# automountServiceAccountToken determines if pod containers can read from the service account
automountServiceAccountToken: true  # Set to false if you want manual token handling

---
