apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: module2-system
  labels:
    app: redis
    component: cache-store
    managed-by: cloudtask-operator
    version: "7.2"
  annotations:
    description: "ClusterIP service for Redis internal access"
    service-type: "cache-and-session-store"
    created-date: "2026-04-19"

spec:
  # ClusterIP type - internal only access
  type: ClusterIP
  
  # Cluster IP (auto-assigned)
  clusterIP: None  # Headless service for stateful Redis
  
  # Selector to match Redis pods
  selector:
    app: redis
  
  # Port configuration
  ports:
  - name: redis
    port: 6379
    targetPort: 6379
    protocol: TCP
  
  # Session affinity (optional, for client consistency)
  sessionAffinity: None
  
  # Traffic policy
  publishNotReadyAddresses: false  # Only expose ready pods

---
