apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: cloudtasks.tasks.orchestrator.dev
  namespace: default
spec:
  group: tasks.orchestrator.dev
  names:
    kind: CloudTask
    plural: cloudtasks
    shortNames:
    - ct
    - cts
  scope: Namespaced
  versions:
  - name: v1
    served: true
    storage: true
    schema:
      openAPIV3Schema:
        type: object
        properties:
          spec:
            type: object
            required:
            - image
            - tenantID
            properties:
              image:
                type: string
                minLength: 1
                description: Container image to run
              command:
                type: array
                items:
                  type: string
                description: Command to run
              args:
                type: array
                items:
                  type: string
                description: Arguments to pass to command
              resources:
                type: object
                properties:
                  requests:
                    type: object
                    properties:
                      cpu:
                        type: string
                        pattern: ^\d+m?$
                      memory:
                        type: string
                        pattern: ^\d+Mi$
                  limits:
                    type: object
                    properties:
                      cpu:
                        type: string
                        pattern: ^\d+m?$
                      memory:
                        type: string
                        pattern: ^\d+Mi$
              retries:
                type: integer
                minimum: 0
                maximum: 10
                default: 3
              timeout:
                type: string
                pattern: ^\d+[smh]$
              tenantID:
                type: string
                minLength: 1
              priority:
                type: integer
                minimum: 0
                maximum: 100
                default: 50
              env:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                    value:
                      type: string
              volumeMounts:
                type: array
                items:
                  type: object
                  properties:
                    name:
                      type: string
                    mountPath:
                      type: string
              labels:
                type: object
                additionalProperties:
                  type: string
              annotations:
                type: object
                additionalProperties:
                  type: string
          status:
            type: object
            properties:
              phase:
                type: string
                enum:
                - Pending
                - Running
                - Completed
                - Failed
              podName:
                type: string
              startTime:
                type: string
                format: date-time
              completionTime:
                type: string
                format: date-time
              retryCount:
                type: integer
              message:
                type: string
              lastUpdateTime:
                type: string
                format: date-time
              conditions:
                type: array
                items:
                  type: object
    subresources:
      status: {}
    additionalPrinterColumns:
    - name: Phase
      type: string
      jsonPath: .status.phase
    - name: Pod
      type: string
      jsonPath: .status.podName
    - name: RetryCount
      type: integer
      jsonPath: .status.retryCount
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
