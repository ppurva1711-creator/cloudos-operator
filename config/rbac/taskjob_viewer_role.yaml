# This rule is not used by the project cloudos-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to scheduler.cloudos.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: cloudos-operator
    app.kubernetes.io/managed-by: kustomize
  name: taskjob-viewer-role
rules:
- apiGroups:
  - scheduler.cloudos.io
  resources:
  - taskjobs
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - scheduler.cloudos.io
  resources:
  - taskjobs/status
  verbs:
  - get
